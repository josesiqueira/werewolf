services:
  postgres:
    image: postgres:16-alpine
    container_name: werewolf-db
    environment:
      POSTGRES_USER: werewolf
      POSTGRES_PASSWORD: werewolf
      POSTGRES_DB: werewolf
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U werewolf"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
