<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" fill="none">
  <!-- Portrait 3: Character with glasses -->
  <rect width="120" height="160" rx="8" fill="#111119"/>
  <!-- Head -->
  <circle cx="60" cy="55" r="24" fill="#2a2a3a"/>
  <!-- Hair - short, tidy -->
  <path d="M36 50 Q36 28 60 26 Q84 28 84 50" fill="#1f1f2e" stroke="#3a3a4e" stroke-width="0.8"/>
  <!-- Glasses frames -->
  <circle cx="50" cy="52" r="8" stroke="#a09d95" stroke-width="1.5" fill="none"/>
  <circle cx="70" cy="52" r="8" stroke="#a09d95" stroke-width="1.5" fill="none"/>
  <line x1="58" y1="52" x2="62" y2="52" stroke="#a09d95" stroke-width="1.5"/>
  <line x1="42" y1="52" x2="36" y2="48" stroke="#a09d95" stroke-width="1.2"/>
  <line x1="78" y1="52" x2="84" y2="48" stroke="#a09d95" stroke-width="1.2"/>
  <!-- Eyes behind glasses -->
  <circle cx="50" cy="52" r="2" fill="#605e58"/>
  <circle cx="70" cy="52" r="2" fill="#605e58"/>
  <!-- Nose -->
  <path d="M58 56 L60 62 L62 56" stroke="#605e58" stroke-width="0.8" fill="none"/>
  <!-- Slight smile -->
  <path d="M54 67 Q60 71 66 67" stroke="#605e58" stroke-width="1" fill="none"/>
  <!-- Shoulders - formal -->
  <path d="M20 135 Q30 100 60 95 Q90 100 100 135" fill="#1f1f2e" stroke="#2a2a3a" stroke-width="1.5"/>
  <!-- Tie -->
  <path d="M57 95 L60 115 L63 95" fill="#3a3a4e" stroke="#3a3a4e" stroke-width="0.5"/>
</svg>
