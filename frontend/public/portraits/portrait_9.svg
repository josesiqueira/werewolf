<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" fill="none">
  <!-- Portrait 9: Character with scar across eye -->
  <rect width="120" height="160" rx="8" fill="#111119"/>
  <!-- Head -->
  <circle cx="60" cy="52" r="24" fill="#2a2a3a"/>
  <!-- Messy short hair -->
  <path d="M36 45 Q35 24 60 20 Q85 24 84 45" fill="#1f1f2e"/>
  <path d="M40 35 L44 28" stroke="#3a3a4e" stroke-width="1.5"/>
  <path d="M55 30 L58 22" stroke="#3a3a4e" stroke-width="1.5"/>
  <path d="M72 32 L76 24" stroke="#3a3a4e" stroke-width="1.5"/>
  <!-- Left eye (normal) -->
  <ellipse cx="50" cy="50" rx="3" ry="2.5" fill="#605e58"/>
  <!-- Right eye (scarred, squinting) -->
  <path d="M65 49 L73 51" stroke="#605e58" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Scar across right eye -->
  <path d="M62 40 L72 58" stroke="#5c3a3a" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Nose - crooked -->
  <path d="M58 54 L56 59 L61 60" stroke="#605e58" stroke-width="1" fill="none"/>
  <!-- Frown -->
  <path d="M52 66 Q60 63 68 66" stroke="#605e58" stroke-width="1.2" fill="none"/>
  <!-- Stubble dots -->
  <circle cx="50" cy="70" r="0.5" fill="#3a3a4e"/>
  <circle cx="55" cy="72" r="0.5" fill="#3a3a4e"/>
  <circle cx="65" cy="72" r="0.5" fill="#3a3a4e"/>
  <circle cx="70" cy="70" r="0.5" fill="#3a3a4e"/>
  <!-- Shoulders - rugged -->
  <path d="M15 140 Q28 98 60 92 Q92 98 105 140" fill="#1f1f2e" stroke="#2a2a3a" stroke-width="1.5"/>
  <!-- Torn collar -->
  <path d="M48 92 L52 100 L56 95 L60 102 L64 95 L68 100 L72 92" stroke="#3a3a4e" stroke-width="1" fill="none"/>
</svg>
